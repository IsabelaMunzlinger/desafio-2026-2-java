<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Pedidos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #003366; margin-top: 0; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; font-weight: 600; }

        button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-family: inherit;}
        .btn-baixar { background-color: #28a745; }
        .btn-baixar:hover { background-color: #218838; }
        .btn-historico { background-color: #17a2b8; margin-left: 8px; }
        .btn-historico:hover { background-color: #138496; }
        .btn-voltar { background-color: #6c757d; margin-top: 20px; padding: 10px 15px; }
        .btn-voltar:hover { background-color: #5a6268; }

        .status-emitido { color: #28a745; font-weight: bold; }
        .status-andamento { color: #fd7e14; font-weight: bold; }
        .status-aguardando { color: #6c757d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Acompanhamento de Solicitações</h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Documento</th>
            <th>Data da Solicitação</th>
            <th>Status Atual</th>
            <th>Ação</th>
        </tr>
        </thead>
        <tbody id="tabelaPedidosBody">
        </tbody>
    </table>

    <button class="btn-voltar" onclick="window.location.href='/menu'"> Voltar ao Menu</button>
</div>

<script src="/meus-pedidos.js"></script>
</body>
</html>
