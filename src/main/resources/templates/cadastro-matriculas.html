<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Matrículas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #003366;
            margin-top: 0;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select {
            width: 100%; padding: 10px; border-radius: 4px;
            border: 1px solid #ccc; font-family: inherit; font-size: 15px;
        }

        button {
            padding: 10px 15px; background-color: #0056b3; color: white;
            border: none; border-radius: 4px; cursor: pointer;
            width: 100%; font-size: 16px; margin-top: 10px;
        }
        button:hover { background-color: #004494; }

        .btn-voltar { background-color: #6c757d; margin-top: 15px; }
        .btn-voltar:hover { background-color: #5a6268; }

        hr { margin: 40px 0; border: 0; border-top: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #333; }

        .status-ativo { color: green; font-weight: bold; }
        .status-inativo { color: red; font-weight: bold; }

        .btn-acao { width: auto; padding: 6px 12px; font-size: 14px; margin: 0; }
        .btn-inativar { background-color: #dc3545; }
        .btn-inativar:hover { background-color: #c82333; }
        .btn-ativar { background-color: #28a745; }
        .btn-ativar:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Vincular Aluno ao Curso</h2>

    <form id="formMatricula">
        <div class="form-group">
            <label for="alunoId">Selecione o Aluno:</label>
            <select id="alunoId" required>
                <option value="">Carregando alunos...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="cursoId">Selecione o Curso:</label>
            <select id="cursoId" required>
                <option value="">Carregando cursos...</option>
            </select>
        </div>
        <button type="submit">Realizar Matrícula</button>
    </form>

    <hr>

    <h2>Matrículas Existentes</h2>
    <table>
        <thead>
        <tr>
            <th>Aluno</th>
            <th>Curso</th>
            <th>Status</th>
            <th>Ação</th>
        </tr>
        </thead>
        <tbody id="tabelaMatriculasBody">
        <tr><td colspan="4">Carregando matrículas...</td></tr>
        </tbody>
    </table>

    <button type="button" class="btn-voltar" onclick="window.location.href='/menu'">Voltar ao Menu</button>
</div>

<script src="/cadastro-matriculas.js"></script>
</body>
</html>
