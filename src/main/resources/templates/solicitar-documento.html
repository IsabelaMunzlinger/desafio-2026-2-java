<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Documento</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #003366; margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        button {
            padding: 10px 15px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background-color: #004494; }
        .btn-testar { background-color: #17a2b8; margin-top: 15px; }
        .btn-testar:hover { background-color: #138496; }
        .btn-voltar {
            background-color: #6c757d;
            width: auto;
            margin-bottom: 20px;
            display: inline-block;
            text-decoration: none;
        }
        .btn-voltar:hover { background-color: #5a6268; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-voltar" onclick="window.location.href='/menu'"> Voltar ao Menu</button>

    <h2>Solicitação de Documentos</h2>

    <form id="formPedido">
        <div class="form-group">
            <label for="documentoId">Escolha o documento que precisa:</label>
            <select id="documentoId" required>
                <option value="">Carregando opções...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cursoId">Selecione o seu curso:</label>
            <select id="cursoId" required>
                <option value="">Carregando opções...</option>
            </select>
        </div>

        <button type="submit">Enviar Solicitação</button>
    </form>
</div>

<script src="/solicitar-documento.js"></script>
</body>
</html>
